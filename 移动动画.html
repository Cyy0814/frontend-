<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #box {
        width: 50px;
        height: 50px;
        background: red;
        position: absolute;
        left: 0;
        top: 50px;
        animation: moveRight 2s forwards; /* 自动播放动画 */
      }

      @keyframes moveRight {
        from {
          left: 0;
        }
        to {
          left: 400px;
        }
      }
    </style>
  </head>

  <body>
    <div id="box"></div>
  </body>
  <script></script>
</html>
